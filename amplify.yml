version: 1
applications:
  - appRoot: /
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
    environment:
      variables:
        # Production values must be set in the Amplify console or via environment variables
        S3_REGION: ""
        S3_ACCESS_KEY_ID: ""
        S3_SECRET_ACCESS_KEY: ""
        S3_BUCKET: ""
        DATABASE_URL: ""
        TURSO_DATABASE_URL: ""
        TURSO_AUTH_TOKEN: ""
        SESSION_SECRET: ""
        ENCRYPTION_KEY: ""
